# generated: pmf-7e3f-tq343
strategy: enhanced_market_scanner

# ---------------------------------------------------------------------------
# Category configuration
# ---------------------------------------------------------------------------
# Each category can be enabled/disabled and assigned a scan priority.
# Lower priority number = scanned first.
# Keywords limit matches to markets whose title or slug contains any of
# the listed terms (case-insensitive).  Empty list = accept all markets.
categories:
  crypto:
    enabled: true
    priority: 1
    keywords: []          # e.g. [bitcoin, ethereum, solana]

  fed:
    enabled: true
    priority: 2
    keywords: []          # e.g. [federal, reserve, fomc, interest rate]

  regulatory:
    enabled: true
    priority: 3
    keywords: []          # e.g. [sec, cftc, regulation, compliance]

  other:
    enabled: true
    priority: 4
    keywords: []          # e.g. [election, sports, weather]

# ---------------------------------------------------------------------------
# Exclusion filters
# ---------------------------------------------------------------------------
# Markets whose title/slug contains any of these terms are skipped,
# regardless of category.
exclude_keywords: []      # e.g. [test, demo, mock]

# Specific market slugs to always skip.
exclude_slugs: []         # e.g. [will-test-market-resolve-yes]

# ---------------------------------------------------------------------------
# Price range filter  (null = disabled)
# ---------------------------------------------------------------------------
# Only pass markets whose current YES price falls within [min, max].
# Useful for targeting a specific probability band.
min_price: null           # e.g. 0.10
max_price: null           # e.g. 0.90

# ---------------------------------------------------------------------------
# Edge range filter  (null = disabled)
# ---------------------------------------------------------------------------
# Only pass markets with a computed edge within [min, max] percent.
min_edge: null            # e.g. 1.0
max_edge: null            # e.g. 20.0

# ---------------------------------------------------------------------------
# Time-to-close range filter  (null = disabled, values in seconds)
# ---------------------------------------------------------------------------
# Only pass markets closing within the specified window.
min_time_to_close: null   # e.g. 60   (at least 1 minute left)
max_time_to_close: null   # e.g. 3600 (no more than 1 hour left)

# ---------------------------------------------------------------------------
# Scanning behaviour
# ---------------------------------------------------------------------------
# Cap the total number of markets held in memory across all categories.
# null = no cap.
max_markets_to_track: null

# When true, only markets not seen in previous scans are returned.
# Useful for "new listing" strategies.
track_new_markets_only: false

# When true, markets seen in any previous scan are silently skipped.
# Combined with track_new_markets_only this gives a one-shot scanner.
ignore_seen_markets: false
