# =============================================================================
# Example Strategy — Configuration Reference
# =============================================================================
#
# This file is the single source of truth for every tunable parameter in the
# strategy.  The strategy reads it on start-up via load_strategy_config().
#
# HOW OVERRIDES WORK
# ------------------
# Priority (highest wins):
#   1. Environment variable  — set in .env or shell  e.g. MIN_PRICE=0.97
#   2. This YAML file        — edit here for permanent changes
#   3. _DEFAULTS in strategy.py — hard-coded fallback, never needs editing
#
# Only scalar keys (float / int / str / bool) that are listed in
# strategies/config_loader.py's _TYPE_MAP can be overridden via env var.
# List and nested keys (scan_categories, categories block) are YAML-only —
# edit this file directly.
#
# =============================================================================

# generated: pmf-7e3f-tq343
strategy: example_strategy

# -----------------------------------------------------------------------------
# Market scope
# -----------------------------------------------------------------------------
# Which Polymarket categories this strategy will scan.
# The main loop calls get_scan_categories() and fetches markets in this order.
# Removing a category from the list excludes all its markets entirely.
#
# Valid values: crypto | fed | regulatory | other
scan_categories:
  - crypto
  - fed
  - regulatory
  - other

# -----------------------------------------------------------------------------
# Price window
# -----------------------------------------------------------------------------
# Only markets whose YES token price falls within [min_price, max_price] are
# considered as potential opportunities.
#
# Example — target near-certain outcomes (settlement arb style):
#   min_price: 0.985
#   max_price: 1.00
#
# Example — target mid-range markets (momentum style):
#   min_price: 0.40
#   max_price: 0.70
#
# Env-var overrides: MIN_PRICE, MAX_PRICE
min_price: 0.985
max_price: 1.00

# -----------------------------------------------------------------------------
# Timing
# -----------------------------------------------------------------------------
# Only enter a position when the market will close within this many seconds.
# Set to a large number (e.g. 86400) to disable the timing gate entirely.
#
# Env-var override: EXECUTE_BEFORE_CLOSE_SECONDS
execute_before_close_seconds: 60

# How long (seconds) to hold the position before forcing an exit at the
# current live price.  Set to 0 to hold until market close (expires_at).
#
# Env-var override: HOLD_SECONDS
hold_seconds: 0

# -----------------------------------------------------------------------------
# Edge filter mode
# -----------------------------------------------------------------------------
# Controls how a candidate opportunity's net edge is evaluated at entry.
#
#   net_edge          — Entry is allowed when:
#                         net_edge = (1 - price) * 100 - taker_fee > 0
#                       Any positive edge after fees is sufficient.
#                       Use this when slippage is negligible (paper mode,
#                       high-liquidity markets, tight spreads).
#
#   slippage_adjusted — Entry is allowed only when:
#                         net_edge > expected_slippage_buffer_pct
#                       Requires the trade to remain profitable even after
#                       absorbing typical fill slippage.
#                       Use this in live mode or thin markets.
#
# Env-var override: EDGE_FILTER_MODE
edge_filter_mode: net_edge

# Minimum net edge (%) that must remain after fees before entry is allowed.
# Only used when edge_filter_mode = slippage_adjusted.
#
# How to set this:
#   - Check execution stats (avg_slippage_pct) after a run in paper mode.
#   - Set this to ~1.5× your observed average slippage as a safety margin.
#
# Env-var override: EXPECTED_SLIPPAGE_BUFFER_PCT
expected_slippage_buffer_pct: 1.0

# -----------------------------------------------------------------------------
# Confidence gate
# -----------------------------------------------------------------------------
# Minimum confidence score (0.0–1.0) an opportunity must reach before the
# strategy returns it.  Confidence is computed inside _calculate_confidence()
# from price proximity, time-to-close, and edge size.
#
# 0.0 = accept every opportunity regardless of confidence (useful for testing)
# 0.5 = moderate filter (recommended starting point)
# 0.8 = only high-conviction opportunities
#
# Note: the global config MIN_CONFIDENCE setting also applies; the strategy
# uses whichever threshold is higher.
#
# Env-var override: STRATEGY_MIN_CONFIDENCE
strategy_min_confidence: 0.0

# -----------------------------------------------------------------------------
# Position sizing
# -----------------------------------------------------------------------------
# Maximum number of simultaneous open positions for THIS strategy.
# Independent of the global MAX_POSITIONS cap.
# Set to null to rely solely on the global cap.
#
# Env-var override: STRATEGY_MAX_POSITIONS
strategy_max_positions: 5

# -----------------------------------------------------------------------------
# Custom parameters (add your own below)
# -----------------------------------------------------------------------------
# Any key you add here will be available in self._cfg inside strategy.py.
# Add the key to _TYPE_MAP in config_loader.py if you want env-var overrides.
#
# Example:
#   my_custom_threshold: 0.75
#   max_age_seconds: 3600
