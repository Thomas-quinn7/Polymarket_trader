# generated: pmf-7e3f-tq343
strategy: paper_demo

# ---------------------------------------------------------------------------
# Hold period
# ---------------------------------------------------------------------------
# How long (seconds) to hold the paper position before exiting at the
# live market price.  Long enough to observe the position in the dashboard.
hold_seconds: 300

# ---------------------------------------------------------------------------
# Market selection
# ---------------------------------------------------------------------------
# Minimum USD volume a market must have to be considered.
# Keeps the demo out of ghost markets with no real activity.
min_volume: 500.0

# Primary category scanned first; the strategy falls back to all others
# automatically if nothing suitable is found in this category.
primary_scan_category: crypto

# Full ordered list of categories to pass to the API scanner.
# The primary_scan_category should appear first.
scan_categories:
  - crypto
  - fed
  - regulatory
  - other
