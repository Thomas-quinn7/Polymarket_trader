version: '3.8'

services:
  trading-bot:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: polymarket-trading-bot
    restart: unless-stopped
    environment:
      - PYTHONUNBUFFERED=1
      # Environment variables from .env file (if present)
      # Polymarket API Configuration
      - POLYMARKET_PRIVATE_KEY=
      - POLYMARKET_FUNDER_ADDRESS=
      # Paper Trading Settings
      - PAPER_TRADING_ENABLED=true
      - PAPER_TRADING_ONLY=true
      - FAKE_CURRENCY_BALANCE=10000.00
      # Dashboard Configuration
      - DASHBOARD_ENABLED=true
      - DASHBOARD_PORT=8080
      - DASHBOARD_HOST=0.0.0.0
      # Logging Configuration
      - LOG_LEVEL=INFO
      - LOG_TO_FILE=true
    ports:
      - "8080:8080"
    volumes:
      # Mount logs directory for persistence
      - ./logs:/app/logs
      # Mount .env file for configuration
      - ./.env:/app/.env:ro
      # Mount .env.template for reference
      - ./.env.template:/app/.env.template:ro
    networks:
      - trading-bot-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

