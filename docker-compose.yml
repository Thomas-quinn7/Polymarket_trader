version: '3.8'

services:
  trading-bot:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: polymarket-trading-bot
    restart: unless-stopped
    # Load all secrets and user config from .env automatically
    env_file:
      - .env
    environment:
      # Docker-specific overrides — these take priority over .env values
      - PYTHONUNBUFFERED=1
      - DASHBOARD_HOST=0.0.0.0
      # SQLite lives in the mounted storage volume
      - DB_ENABLED=true
      - DB_PATH=/app/storage/trading.db
      # ScyllaDB is always available inside Docker Compose —
      # use the service name as the host and enable the connection
      - SCYLLA_ENABLED=true
      - SCYLLA_HOST=scylla
      - SCYLLA_PORT=9042
      - SCYLLA_KEYSPACE=polymarket
      # Session storage and Ollama review generation
      - SESSIONS_DIR=/app/logs/sessions
      - OLLAMA_ENABLED=true
      - OLLAMA_HOST=http://ollama:11434
      - OLLAMA_MODEL=llama3.2:3b
    ports:
      - "8080:8080"
    volumes:
      # Persist logs and SQLite database outside the container
      - ./logs:/app/logs
      - ./storage:/app/storage
      # Mount .env so the Settings UI can write changes back
      - ./.env:/app/.env
      - ./.env.example:/app/.env.example:ro
    depends_on:
      scylla:
        condition: service_healthy
      ollama:
        condition: service_healthy
    networks:
      - trading-bot-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  scylla:
    image: scylladb/scylla:5.4
    container_name: polymarket-scylla
    restart: unless-stopped
    # Single CPU, 750 MB RAM, developer mode — suitable for a local/dev setup
    command: --smp 1 --memory 750M --overprovisioned 1 --developer-mode 1
    volumes:
      - scylla_data:/var/lib/scylla
    ports:
      # Expose CQL port so you can query ScyllaDB from outside Docker (optional)
      - "9042:9042"
    networks:
      - trading-bot-network
    healthcheck:
      # Wait until ScyllaDB reports a node in UN (Up/Normal) state
      test: ["CMD-SHELL", "nodetool status | grep UN"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 90s

  ollama:
    image: ollama/ollama:latest
    container_name: polymarket-ollama
    restart: unless-stopped
    volumes:
      # Persist downloaded models so they survive container restarts
      - ollama_data:/root/.ollama
    ports:
      - "11434:11434"
    networks:
      - trading-bot-network
    # GPU support: uncomment the deploy block below if you have NVIDIA Container Toolkit
    # deploy:
    #   resources:
    #     reservations:
    #       devices:
    #         - driver: nvidia
    #           count: all
    #           capabilities: [gpu]
    healthcheck:
      # ollama list exits 0 once the daemon is ready
      test: ["CMD", "ollama", "list"]
      interval: 20s
      timeout: 10s
      retries: 5
      start_period: 30s

networks:
  trading-bot-network:
    driver: bridge

volumes:
  scylla_data:
    driver: local
  ollama_data:
    driver: local
