version: '3.8'

services:
  trading-bot:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: polymarket-trading-bot
    restart: unless-stopped
    environment:
      - PYTHONUNBUFFERED=1
      # Environment variables from .env file (if present)
      # Polymarket API Configuration
      - POLYMARKET_PRIVATE_KEY=
      - POLYMARKET_FUNDER_ADDRESS=
      # Paper Trading Settings
      - PAPER_TRADING_ENABLED=true
      - PAPER_TRADING_ONLY=true
      - FAKE_CURRENCY_BALANCE=10000.00
      # Dashboard Configuration
      - DASHBOARD_ENABLED=true
      - DASHBOARD_PORT=8080
      - DASHBOARD_HOST=0.0.0.0
      # Logging Configuration
      - LOG_LEVEL=INFO
      - LOG_TO_FILE=true
      # SQLite database path (mounted volume below)
      - DB_ENABLED=true
      - DB_PATH=/app/storage/trading.db
      # ScyllaDB (set SCYLLA_ENABLED=true to activate)
      - SCYLLA_ENABLED=false
      - SCYLLA_HOST=scylla
      - SCYLLA_PORT=9042
    ports:
      - "8080:8080"
    volumes:
      # Mount logs directory for persistence
      - ./logs:/app/logs
      # Mount storage directory — SQLite database lives here
      - ./storage:/app/storage
      # Mount .env file for configuration (rw so Settings page can write back)
      - ./.env:/app/.env
      # Mount .env.template for reference
      - ./.env.template:/app/.env.template:ro
    depends_on:
      scylla:
        condition: service_healthy
    networks:
      - trading-bot-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  scylla:
    image: scylladb/scylla:5.4
    container_name: polymarket-scylla
    restart: unless-stopped
    command: --smp 1 --memory 750M --overprovisioned 1 --developer-mode 1
    volumes:
      - scylla_data:/var/lib/scylla
    networks:
      - trading-bot-network
    healthcheck:
      test: ["CMD-SHELL", "nodetool status | grep UN"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 90s

networks:
  trading-bot-network:
    driver: bridge

volumes:
  scylla_data:
    driver: local
